# Minimal HTTP-only nginx config used during initial setup. Two jobs:
#   1. Serve the /.well-known/acme-challenge/ path so certbot can prove we
#      own the hostname and issue a Let's Encrypt certificate.
#   2. Proxy everything else to the running Next.js on :3000 so the box is
#      already serving (over plain HTTP) before SSL is wired up.
#
# Replaced by deploy/nginx.conf (full HTTPS + hardening) the moment
# setup-nginx.sh has the cert in hand.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name YOUR_DOMAIN _;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
