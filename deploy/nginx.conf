# Nginx reverse-proxy config for anvbla. Drop into
#   /etc/nginx/sites-available/anvbla
# then symlink + reload:
#   sudo ln -sf /etc/nginx/sites-available/anvbla /etc/nginx/sites-enabled/anvbla
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Finally, get a Let's Encrypt cert (it edits this file in place):
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#
# Replace YOUR_DOMAIN with the real one before applying.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Body size big enough for the largest profile pic upload, etc.
    client_max_body_size 10m;

    # Buffering OFF so streamed RSC payloads flush to the client immediately
    # — otherwise Suspense skeletons stall behind nginx's buffer fill.
    proxy_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long-lived cache for Next's hashed static assets.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else hits Next directly.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 60s;
    }
}
