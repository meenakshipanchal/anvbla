# Nginx reverse-proxy config for anvbla — production-grade hardening:
#   HTTP/2, HSTS, strict security headers, rate limiting, gzip,
#   long-cache for /_next/static, brief cache for /_next/image.
#
# Apply via deploy/setup-nginx.sh — that script substitutes the
# domain placeholder, links the site, runs certbot, and reloads.
#
# Manual install (if you prefer):
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/anvbla
#   sudo sed -i 's/YOUR_DOMAIN/13.201.32.141.sslip.io/g' /etc/nginx/sites-available/anvbla
#   sudo ln -sf /etc/nginx/sites-available/anvbla /etc/nginx/sites-enabled/anvbla
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d YOUR_DOMAIN

# Rate limit zones — defined at the http level via include from the main
# config. We add them once globally in setup-nginx.sh (see that file).

# ── HTTP : redirect everything to HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let certbot finish its ACME challenge here before redirecting.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS : the real site ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # certbot fills these in when it runs; leaving placeholders here is fine.
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # ── TLS hardening (Mozilla "intermediate" 2024) ─────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ────────────────────────────────────────────────────
    # HSTS: every browser remembers this site is HTTPS-only for a year.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Block Flash / FB pixel / etc. — only what we use.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    # Cross-Origin headers matched to next.config (Firebase popup needs allow-popups).
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # ── Body + buffering ────────────────────────────────────────────────────
    client_max_body_size 10m;
    # OFF so streamed RSC payloads flush immediately — Suspense skeletons
    # otherwise stall behind nginx's buffer fill.
    proxy_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Compression (gzip; brotli requires module not in stock nginx) ──────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ── Per-zone rate limits ────────────────────────────────────────────────
    # Auth endpoints — strict (brute force / token abuse).
    location /api/auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # Catch-all API — loose enough for normal use, blocks scrapers.
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # Next.js hashed static assets — immutable, cache forever.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Next.js optimized images — short cache, lets us bust by changing URL.
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60s;
    }

    # Everything else.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 60s;
    }
}
