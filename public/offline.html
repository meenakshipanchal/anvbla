<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline · BlaBlue</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      min-height: 100vh; display: grid; place-items: center; padding: 24px;
      background: linear-gradient(160deg, #054752, #0a5d6b 60%, #0b6f80);
      color: #fff; text-align: center;
    }
    .box { max-width: 420px; }
    .logo { width: 64px; height: 64px; margin: 0 auto 20px; }
    h1 { font-size: 26px; margin-bottom: 10px; }
    p { color: #cfe9ee; font-size: 16px; line-height: 1.5; }
    button {
      margin-top: 24px; border: none; cursor: pointer;
      background: #0071eb; color: #fff; font-weight: 600; font-size: 15px;
      padding: 12px 26px; border-radius: 999px;
    }
    button:hover { background: #005bc4; }
  </style>
</head>
<body>
  <div class="box">
    <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="13" fill="#0071eb" />
      <path d="M14 30c0-3.3 2.7-6 6-6h2.5c2.5 0 4.5-2 4.5-4.5S25 15 22.5 15H16" stroke="#9ef769" stroke-width="3.4" stroke-linecap="round" />
      <circle cx="33" cy="20" r="3.6" fill="#2dbeff" />
      <circle cx="16" cy="33" r="3.6" fill="#fff" />
    </svg>
    <h1>You’re offline</h1>
    <p>No internet right now. Pages you’ve already visited stay available — reconnect to search for new rides.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
